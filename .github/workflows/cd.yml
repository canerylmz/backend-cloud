name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.VM_APP_DIR }}"
            PORT="${{ secrets.VM_PORT }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/backend-cloud"; fi
            if [ -z "$PORT" ]; then PORT="8001"; fi
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch --all --tags
            git checkout "${{ github.ref_name }}"
            docker build -t backend-cloud:latest .
            docker rm -f backend-cloud || true
            docker run -d --name backend-cloud --restart unless-stopped -p "$PORT:8000" -e DJANGO_ALLOWED_HOSTS="*" backend-cloud:latest
